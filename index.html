<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TXT</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.ico">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

  <style>
    :root{
      --bg:#000;
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --border:rgba(255,255,255,.12);
      --accent:rgba(255,255,255,.18);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --topbar-h: 38px;
      --pad-x: 18px;
      --pad-y: 16px;
      --line: 1.55;
      color-scheme: dark;
    }

    *{ box-sizing:border-box; }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    #topbar{
      position:fixed;
      inset:0 0 auto 0;
      height:var(--topbar-h);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 var(--pad-x);
      background:rgba(0,0,0,.96);
      border-bottom:1px solid var(--border);
      font: 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      z-index:5;
      user-select:none;
      white-space:nowrap;
      overflow:hidden;
    }

    #leftBar, #midBar, #rightBar{
      display:flex;
      align-items:center;
      min-width:0;
    }

    #leftBar{ flex:0 0 auto; }

    #domainLink{
      color:var(--text);
      font-weight:600;
      letter-spacing:.2px;
      max-width:45vw;
      overflow:hidden;
      text-overflow:ellipsis;
      text-decoration:none;
    }

    #domainLink:hover{
      text-decoration:underline;
      text-decoration-color:rgba(255,255,255,.35);
      text-underline-offset:2px;
    }

    #midBar{
      flex:1 1 auto;
      gap:12px;
      color:var(--muted);
      overflow:hidden;
      text-overflow:ellipsis;
    }

    #lines{
      cursor:pointer;
      padding:2px 6px;
      border-radius:6px;
    }
    #lines:hover{
      background:rgba(255,255,255,.06);
    }

    #langSelect{
      appearance:auto;
      background:#000;
      color:var(--muted);
      border:1px solid var(--border);
      border-radius:8px;
      padding:4px 8px;
      margin:0;
      font: inherit;
      outline:none;
      cursor:pointer;
      max-width:48vw;
      color-scheme: dark;
    }
    #langSelect:focus{
      border-color:rgba(255,255,255,.30);
      box-shadow: 0 0 0 3px rgba(255,255,255,.10);
    }

    #langSelect option{
      background:#000;
      color:#fff;
    }
    #langSelect option:checked{
      background:#111;
      color:#fff;
    }
    #langSelect option:hover,
    #langSelect option:focus{
      background:#111;
      color:#fff;
    }

    .topBtn{
      margin-left:6px;
      width:30px;
      height:30px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#000;
      color:var(--muted);
      border:1px solid var(--border);
      border-radius:8px;
      cursor:pointer;
      outline:none;
      flex:0 0 auto;
    }

    .topBtn:hover{
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.86);
    }

    .topBtn:active{
      background:rgba(255,255,255,.10);
    }

    .topBtn:focus-visible{
      border-color:rgba(255,255,255,.30);
      box-shadow: 0 0 0 3px rgba(255,255,255,.10);
    }

    .topBtn svg{
      width:16px;
      height:16px;
      display:block;
    }

    .topBtn.active{
      background:rgba(255,255,255,.12);
      color:#fff;
      border-color:rgba(255,255,255,.25);
    }

    .topBtn.hidden{
      display:none;
    }

    #editorWrap{
      position:fixed;
      inset:var(--topbar-h) 0 0 0;
      background:var(--bg);
    }

    #scroller{
      position:absolute;
      inset:0;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }

    #layer{
      position:relative;
      width:100%;
      height:100%;
    }

    #highlight, #text{
      position:absolute;
      inset:0;
      margin:0;
      padding:var(--pad-y) var(--pad-x);
      font-family:var(--mono);
      font-size:14px;
      line-height:var(--line);
      tab-size:2;
      -moz-tab-size:2;
      border:0;
      outline:none;
      overflow:hidden;
      text-indent:0;
      direction:ltr;
      white-space:pre;
    }

    body.wrap #highlight,
    body.wrap #text{
      white-space:pre-wrap;
      overflow-wrap:anywhere;
      word-break:break-word;
    }

    #highlight{ pointer-events:none; }

    #highlight code{
      display:block;
      min-height:100%;
      padding:0 !important;
      margin:0 !important;
      white-space:inherit;
      font-family:inherit !important;
      font-size:inherit !important;
      line-height:inherit !important;
    }

    #text{
      resize:none;
      background:transparent;
      color:transparent;
      caret-color:var(--text);
      text-shadow:none;
      touch-action: pan-x pan-y;
    }

    #text::selection{ background:var(--accent); }

    .hljs{
      background:transparent !important;
      padding:0 !important;
      margin:0 !important;
    }

    #measure{
      position:absolute;
      left:-99999px;
      top:-99999px;
      visibility:hidden;
      margin:0;
      padding:var(--pad-y) var(--pad-x);
      font-family:var(--mono);
      font-size:14px;
      line-height:var(--line);
      tab-size:2;
      -moz-tab-size:2;
      white-space:pre;
    }

    body.wrap #measure{
      white-space:pre-wrap;
      overflow-wrap:anywhere;
      word-break:break-word;
    }

    /* ── Markdown Preview ── */

    #mdPreview{
      position:absolute;
      inset:0;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:32px clamp(18px, 5vw, 64px) 64px;
      display:none;
      background:var(--bg);
    }

    body.md-preview #mdPreview{ display:block; }
    body.md-preview #scroller{ display:none; }

    #mdPreview .md-body{
      max-width:760px;
      margin:0 auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size:15px;
      line-height:1.7;
      color:rgba(255,255,255,.88);
      word-wrap:break-word;
    }

    /* Headings */
    #mdPreview .md-body h1,
    #mdPreview .md-body h2,
    #mdPreview .md-body h3,
    #mdPreview .md-body h4,
    #mdPreview .md-body h5,
    #mdPreview .md-body h6{
      color:#fff;
      font-weight:600;
      line-height:1.3;
      margin:1.6em 0 .6em;
    }
    #mdPreview .md-body h1:first-child,
    #mdPreview .md-body h2:first-child,
    #mdPreview .md-body h3:first-child{
      margin-top:0;
    }
    #mdPreview .md-body h1{ font-size:1.9em; letter-spacing:-.02em; }
    #mdPreview .md-body h2{
      font-size:1.45em;
      padding-bottom:.35em;
      border-bottom:1px solid var(--border);
    }
    #mdPreview .md-body h3{ font-size:1.2em; }
    #mdPreview .md-body h4{ font-size:1.05em; }

    /* Paragraphs & basics */
    #mdPreview .md-body p{ margin:0 0 1em; }
    #mdPreview .md-body strong{ color:#fff; font-weight:600; }
    #mdPreview .md-body em{ font-style:italic; }

    /* Links */
    #mdPreview .md-body a{
      color:rgba(130,170,255,.9);
      text-decoration:none;
    }
    #mdPreview .md-body a:hover{
      text-decoration:underline;
      text-underline-offset:2px;
    }

    /* Lists */
    #mdPreview .md-body ul,
    #mdPreview .md-body ol{
      margin:0 0 1em;
      padding-left:1.8em;
    }
    #mdPreview .md-body li{ margin:.25em 0; }
    #mdPreview .md-body li > p{ margin:0; }

    /* Task lists */
    #mdPreview .md-body input[type="checkbox"]{
      margin-right:.4em;
      accent-color:rgba(130,170,255,.9);
    }

    /* Blockquotes */
    #mdPreview .md-body blockquote{
      margin:0 0 1em;
      padding:.6em 1em;
      border-left:3px solid rgba(255,255,255,.2);
      color:rgba(255,255,255,.6);
      background:rgba(255,255,255,.03);
      border-radius:0 6px 6px 0;
    }
    #mdPreview .md-body blockquote p:last-child{ margin-bottom:0; }

    /* Code inline */
    #mdPreview .md-body code{
      font-family:var(--mono);
      font-size:.88em;
      padding:.15em .4em;
      background:rgba(255,255,255,.08);
      border-radius:4px;
      color:rgba(255,255,255,.82);
    }

    /* Code blocks */
    #mdPreview .md-body pre{
      margin:0 0 1em;
      padding:14px 16px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--border);
      border-radius:8px;
      overflow-x:auto;
      line-height:1.5;
    }
    #mdPreview .md-body pre code{
      padding:0;
      background:none;
      border-radius:0;
      font-size:.85em;
      color:rgba(255,255,255,.82);
    }

    /* Tables */
    #mdPreview .md-body table{
      width:100%;
      border-collapse:collapse;
      margin:0 0 1em;
      font-size:.92em;
    }
    #mdPreview .md-body th,
    #mdPreview .md-body td{
      padding:8px 12px;
      border:1px solid rgba(255,255,255,.1);
      text-align:left;
    }
    #mdPreview .md-body th{
      font-weight:600;
      color:#fff;
      background:rgba(255,255,255,.05);
    }
    #mdPreview .md-body tr:nth-child(even){
      background:rgba(255,255,255,.02);
    }
    
    #mdPreview .md-body td[align="center"],
    #mdPreview .md-body th[align="center"]{ text-align:center; }
    #mdPreview .md-body td[align="right"],
    #mdPreview .md-body th[align="right"]{ text-align:right; }

    /* Horizontal rule */
    #mdPreview .md-body hr{
      border:none;
      border-top:1px solid rgba(255,255,255,.12);
      margin:2em 0;
    }

    /* Images */
    #mdPreview .md-body img{
      max-width:100%;
      height:auto;
      border-radius:6px;
      margin:.5em 0;
    }

    /* Details */
    #mdPreview .md-body details{
      margin:0 0 1em;
      padding:.5em 1em;
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:6px;
    }
    #mdPreview .md-body summary{
      cursor:pointer;
      font-weight:600;
      color:#fff;
    }

    #mdPreview .md-body sup a{ font-size:.8em; }

    /* ── HTML Preview ── */

    #htmlPreview{
      position:absolute;
      inset:0;
      display:none;
      background:#fff;
    }

    body.html-preview #htmlPreview{ display:block; }
    body.html-preview #scroller{ display:none; }

    #htmlPreviewFrame{
      width:100%;
      height:100%;
      border:none;
      background:#fff;
    }
  </style>
</head>

<body>
  <div id="topbar">
    <div id="leftBar">
      <a id="domainLink" href="#" title="Open empty editor (clears URL text)"></a>
    </div>

    <div id="midBar">
      <span id="chars"></span>
      <span id="lines" title="Toggle line wrapping"></span>
    </div>

    <div id="rightBar">
      <select id="langSelect" title="Language"></select>

      <button id="mdToggleBtn" class="topBtn hidden" type="button" title="Toggle Markdown preview">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>

      <button id="htmlToggleBtn" class="topBtn hidden" type="button" title="Toggle HTML preview">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>

      <button id="downloadBtn" class="topBtn" type="button" title="Download">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="editorWrap">
    <div id="scroller">
      <div id="layer">
        <pre id="highlight" aria-hidden="true"><code id="code" class="hljs"></code></pre>
        <textarea id="text" wrap="off" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
      </div>
    </div>
    <div id="mdPreview"><div class="md-body" id="mdBody"></div></div>
    <div id="htmlPreview"><iframe id="htmlPreviewFrame" sandbox="allow-scripts allow-same-origin" title="HTML Preview"></iframe></div>
    <pre id="measure" aria-hidden="true"></pre>
  </div>

  <script>
    const LZString = (function(){
      const f = String.fromCharCode;
      const keyStrUriSafe = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+-$";
      const baseReverseDic = Object.create(null);

      function getBaseValue(alphabet, character) {
        if (!baseReverseDic[alphabet]) {
          baseReverseDic[alphabet] = Object.create(null);
          for (let i = 0; i < alphabet.length; i++) baseReverseDic[alphabet][alphabet.charAt(i)] = i;
        }
        return baseReverseDic[alphabet][character];
      }

      function compressToEncodedURIComponent(input) {
        if (input == null) return "";
        return _compress(input, 6, function(a){ return keyStrUriSafe.charAt(a); });
      }

      function decompressFromEncodedURIComponent(input) {
        if (input == null) return "";
        if (input === "") return null;
        input = input.replace(/ /g, "+");
        return _decompress(input.length, 32, function(index){ return getBaseValue(keyStrUriSafe, input.charAt(index)); });
      }

      function _compress(uncompressed, bitsPerChar, getCharFromInt) {
        if (uncompressed == null) return "";
        let i, value;
        const context_dictionary = Object.create(null);
        const context_dictionaryToCreate = Object.create(null);
        let context_c = "";
        let context_wc = "";
        let context_w = "";
        let context_enlargeIn = 2;
        let context_dictSize = 3;
        let context_numBits = 2;
        let context_data = [];
        let context_data_val = 0;
        let context_data_position = 0;

        for (let ii = 0; ii < uncompressed.length; ii++) {
          context_c = uncompressed.charAt(ii);
          if (context_dictionary[context_c] == null) {
            context_dictionary[context_c] = context_dictSize++;
            context_dictionaryToCreate[context_c] = true;
          }

          context_wc = context_w + context_c;
          if (context_dictionary[context_wc] != null) {
            context_w = context_wc;
          } else {
            if (context_dictionaryToCreate[context_w] != null) {
              if (context_w.charCodeAt(0) < 256) {
                for (i = 0; i < context_numBits; i++) {
                  context_data_val = (context_data_val << 1);
                  if (context_data_position === bitsPerChar - 1) {
                    context_data_position = 0;
                    context_data.push(getCharFromInt(context_data_val));
                    context_data_val = 0;
                  } else {
                    context_data_position++;
                  }
                }
                value = context_w.charCodeAt(0);
                for (i = 0; i < 8; i++) {
                  context_data_val = (context_data_val << 1) | (value & 1);
                  if (context_data_position === bitsPerChar - 1) {
                    context_data_position = 0;
                    context_data.push(getCharFromInt(context_data_val));
                    context_data_val = 0;
                  } else {
                    context_data_position++;
                  }
                  value >>= 1;
                }
              } else {
                value = 1;
                for (i = 0; i < context_numBits; i++) {
                  context_data_val = (context_data_val << 1) | value;
                  if (context_data_position === bitsPerChar - 1) {
                    context_data_position = 0;
                    context_data.push(getCharFromInt(context_data_val));
                    context_data_val = 0;
                  } else {
                    context_data_position++;
                  }
                  value = 0;
                }
                value = context_w.charCodeAt(0);
                for (i = 0; i < 16; i++) {
                  context_data_val = (context_data_val << 1) | (value & 1);
                  if (context_data_position === bitsPerChar - 1) {
                    context_data_position = 0;
                    context_data.push(getCharFromInt(context_data_val));
                    context_data_val = 0;
                  } else {
                    context_data_position++;
                  }
                  value >>= 1;
                }
              }
              context_enlargeIn--;
              if (context_enlargeIn === 0) {
                context_enlargeIn = Math.pow(2, context_numBits);
                context_numBits++;
              }
              delete context_dictionaryToCreate[context_w];
            } else {
              value = context_dictionary[context_w];
              for (i = 0; i < context_numBits; i++) {
                context_data_val = (context_data_val << 1) | (value & 1);
                if (context_data_position === bitsPerChar - 1) {
                  context_data_position = 0;
                  context_data.push(getCharFromInt(context_data_val));
                  context_data_val = 0;
                } else {
                  context_data_position++;
                }
                value >>= 1;
              }
            }
            context_enlargeIn--;
            if (context_enlargeIn === 0) {
              context_enlargeIn = Math.pow(2, context_numBits);
              context_numBits++;
            }
            context_dictionary[context_wc] = context_dictSize++;
            context_w = String(context_c);
          }
        }

        if (context_w !== "") {
          if (context_dictionaryToCreate[context_w] != null) {
            if (context_w.charCodeAt(0) < 256) {
              for (i = 0; i < context_numBits; i++) {
                context_data_val = (context_data_val << 1);
                if (context_data_position === bitsPerChar - 1) {
                  context_data_position = 0;
                  context_data.push(getCharFromInt(context_data_val));
                  context_data_val = 0;
                } else {
                  context_data_position++;
                }
              }
              value = context_w.charCodeAt(0);
              for (i = 0; i < 8; i++) {
                context_data_val = (context_data_val << 1) | (value & 1);
                if (context_data_position === bitsPerChar - 1) {
                  context_data_position = 0;
                  context_data.push(getCharFromInt(context_data_val));
                  context_data_val = 0;
                } else {
                  context_data_position++;
                }
                value >>= 1;
              }
            } else {
              value = 1;
              for (i = 0; i < context_numBits; i++) {
                context_data_val = (context_data_val << 1) | value;
                if (context_data_position === bitsPerChar - 1) {
                  context_data_position = 0;
                  context_data.push(getCharFromInt(context_data_val));
                  context_data_val = 0;
                } else {
                  context_data_position++;
                }
                value = 0;
              }
              value = context_w.charCodeAt(0);
              for (i = 0; i < 16; i++) {
                context_data_val = (context_data_val << 1) | (value & 1);
                if (context_data_position === bitsPerChar - 1) {
                  context_data_position = 0;
                  context_data.push(getCharFromInt(context_data_val));
                  context_data_val = 0;
                } else {
                  context_data_position++;
                }
                value >>= 1;
              }
            }
            context_enlargeIn--;
            if (context_enlargeIn === 0) {
              context_enlargeIn = Math.pow(2, context_numBits);
              context_numBits++;
            }
            delete context_dictionaryToCreate[context_w];
          } else {
            value = context_dictionary[context_w];
            for (i = 0; i < context_numBits; i++) {
              context_data_val = (context_data_val << 1) | (value & 1);
              if (context_data_position === bitsPerChar - 1) {
                context_data_position = 0;
                context_data.push(getCharFromInt(context_data_val));
                context_data_val = 0;
              } else {
                context_data_position++;
              }
              value >>= 1;
            }
          }
          context_enlargeIn--;
          if (context_enlargeIn === 0) {
            context_enlargeIn = Math.pow(2, context_numBits);
            context_numBits++;
          }
        }

        value = 2;
        for (i = 0; i < context_numBits; i++) {
          context_data_val = (context_data_val << 1) | (value & 1);
          if (context_data_position === bitsPerChar - 1) {
            context_data_position = 0;
            context_data.push(getCharFromInt(context_data_val));
            context_data_val = 0;
          } else {
            context_data_position++;
          }
          value >>= 1;
        }

        while (true) {
          context_data_val = (context_data_val << 1);
          if (context_data_position === bitsPerChar - 1) {
            context_data.push(getCharFromInt(context_data_val));
            break;
          } else context_data_position++;
        }
        return context_data.join("");
      }

      function _decompress(length, resetValue, getNextValue) {
        const dictionary = [];
        let next;
        let enlargeIn = 4;
        let dictSize = 4;
        let numBits = 3;
        let entry = "";
        let result = [];
        let i;
        let w;
        let bits, resb, maxpower, power;

        const data = { val: getNextValue(0), position: resetValue, index: 1 };

        for (i = 0; i < 3; i++) dictionary[i] = i;

        bits = 0;
        maxpower = Math.pow(2,2);
        power = 1;
        while (power !== maxpower) {
          resb = data.val & data.position;
          data.position >>= 1;
          if (data.position === 0) {
            data.position = resetValue;
            data.val = getNextValue(data.index++);
          }
          bits |= (resb > 0 ? 1 : 0) * power;
          power <<= 1;
        }

        switch (next = bits) {
          case 0:
            bits = 0;
            maxpower = Math.pow(2,8);
            power = 1;
            while (power !== maxpower) {
              resb = data.val & data.position;

                data.position = resetValue;
                data.val = getNextValue(data.index++);

            data.position >>= 1;
            if (data.position === 0) {

              data.val = getNextValue(data.index++);
            }
            bits |= (resb > 0 ? 1 : 0) * power;

          }

              bits = 0;
              maxpower = Math.pow(2,8);
              power = 1;
              while (power !== maxpower) {
                resb = data.val & data.position;
                data.position >>= 1;
                if (data.position === 0) {
                  data.position = resetValue;
                  data.val = getNextValue(data.index++);
                }

              }

              maxpower = Math.pow(2,16);

                }

                power <<= 1;
              }

              next = dictSize - 1;
              enlargeIn--;
              break;

              return result.join("");
          }

          if (enlargeIn === 0) {
            enlargeIn = Math.pow(2, numBits);
            numBits++;
          }

          if (dictionary[next]) {
            entry = dictionary[next];
          } else {
            if (next === dictSize) entry = w + w.charAt(0);

          }
          result.push(entry);

          dictionary[dictSize++] = w + entry.charAt(0);
          enlargeIn--;

      writer.close();
      const buf = await new Response(ds.readable).arrayBuffer();

    async function encodeToHashPayload(text, langId) {
      const { norm, nl } = normalizeNewlinesLossless(text);
      const langIdx = getLangIndexById(langId);
      const langChar = base36Char(langIdx);

      const candidates = [];

      try {
        const raw = encodeURIComponent(norm);

      } catch (e) {}

      try {
        const lz = LZString.compressToEncodedURIComponent(norm);
        candidates.push({ base: "l", d: lz });
      } catch (e) {}

      let best = candidates[0] || { base: "u", d: "" };
      for (const c of candidates) {
        if (c.d.length < best.d.length) best = c;
      }

      const variantIndex = nl + (wrapEnabled ? 3 : 0);
      const methodChar = (METHOD_VARIANTS[best.base] && METHOD_VARIANTS[best.base][variantIndex])
        ? METHOD_VARIANTS[best.base][variantIndex]
        : best.base;

      return methodChar + langChar + best.d;
    }

    async function decodeFromHashPayload(payload) {
      if (!payload) return { text: "", langId: "auto", wrap: false };

      const methodChar = payload.charAt(0);
      const langChar = payload.charAt(1);
      const data = payload.slice(2);

      const info = METHOD_REVERSE.get(methodChar) || { base: methodChar, nl: 0, wrap: false };
      const base = info.base;
      const nl = info.nl;
      const wrap = !!info.wrap;

      const langIdx = base36ToInt(langChar);
      const langId = getLangIdByIndex(langIdx);

      let norm = "";

      if (base === "u") {
        try { norm = decodeURIComponent(data); } catch (e) { norm = ""; }

        return { text: restoreNewlinesLossless(norm, nl), langId, wrap };

      if (supportsCompressionStream()) {

    }

    function downloadAsHtml() {
      const text = $text.value || "";
      if (!window.marked) return;

      const html = buildHtmlDocument(text);
      const filename = getFileBase() + "-" + getDateStamp() + ".html";
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();

      setTimeout(() => URL.revokeObjectURL(url), 250);
    }

    /* ── Markdown-specific UI ── */
    
    function prepareMdText(text) {
      return (text || "")
        .replace(/\r\n?/g, "\n")
        .replace(/^(`{3,}.*?)[ \t]+$/gm, '$1')
        .replace(/^(~{3,}.*?)[ \t]+$/gm, '$1');
    }

    function isMarkdownActive() {
      const eLang = autoEnabled ? currentShownLang : lockedLang;
      return eLang === "markdown";
    }

    function isHtmlActive() {
      const eLang = autoEnabled ? currentShownLang : lockedLang;
      return eLang === "html";
    }

    function updatePreviewButtons() {
      const isMd = isMarkdownActive();
      const isHtml = isHtmlActive();

      /* Markdown button */
      $mdToggleBtn.classList.toggle("hidden", !isMd);
      $mdToggleBtn.classList.toggle("active", mdPreviewActive && isMd);

      /* HTML button */
      $htmlToggleBtn.classList.toggle("hidden", !isHtml);
      $htmlToggleBtn.classList.toggle("active", htmlPreviewActive && isHtml);

      /* Download button style: show HTML icon only when md-preview is active (converts md to html) */
      const htmlDlMode = (isMd && mdPreviewActive);
      $downloadBtn.innerHTML = htmlDlMode ? DL_ICON_HTML : DL_ICON_DEFAULT;
      $downloadBtn.title = htmlDlMode ? "Download as HTML" : "Download";

      /* Deactivate previews if language switched away */
      if (!isMd && mdPreviewActive) {
        mdPreviewActive = false;
        document.body.classList.remove("md-preview");
      }
      if (!isHtml && htmlPreviewActive) {
        htmlPreviewActive = false;
        document.body.classList.remove("html-preview");
      }
    }

    function updateMdPreview() {
      if (!mdPreviewActive || !window.marked) return;
      const text = ($text.value || "").replace(/\r\n?/g, "\n");
      $mdBody.innerHTML = marked.parse(prepareMdText($text.value));

      if (window.hljs) {
        $mdBody.querySelectorAll("pre code").forEach(block => {
          hljs.highlightElement(block);
        });
      }
    }

    function updateHtmlPreview() {
      if (!htmlPreviewActive) return;
      const text = $text.value || "";
      $htmlPreviewFrame.srcdoc = text;
    }

    function toggleMdPreview() {
      mdPreviewActive = !mdPreviewActive;
      document.body.classList.toggle("md-preview", mdPreviewActive);
      $mdToggleBtn.classList.toggle("active", mdPreviewActive);

      const htmlDlMode = mdPreviewActive;
      $downloadBtn.innerHTML = htmlDlMode ? DL_ICON_HTML : DL_ICON_DEFAULT;
      $downloadBtn.title = htmlDlMode ? "Download as HTML" : "Download";

      if (mdPreviewActive) {
        updateMdPreview();
      } else {
        $text.focus();
      }
    }

    function toggleHtmlPreview() {
      htmlPreviewActive = !htmlPreviewActive;
      document.body.classList.toggle("html-preview", htmlPreviewActive);
      $htmlToggleBtn.classList.toggle("active", htmlPreviewActive);

      if (htmlPreviewActive) {
        updateHtmlPreview();
      } else {
        $text.focus();
      }
    }

    function render() {
      const text = $text.value;

      applyWrapState();
      updateTitleFromFirstLine(text);
      updateStats(text);
      computeLayerSize(text);

      let shown;
      if (autoEnabled) {
        shown = renderAuto(text);
        ensureLangOption(shown);
        if (hasLangOption(shown)) setDropdownValueSilently(shown);
        else setDropdownValueSilently("plaintext");
      } else {
        shown = renderFixed(text, lockedLang);
        ensureLangOption(shown);
        if (hasLangOption(lockedLang)) setDropdownValueSilently(lockedLang);
        else setDropdownValueSilently("plaintext");
      }

      currentShownLang = shown || "plaintext";

      updateOptionLabels($langSelect.value);
      updatePreviewButtons();

      if (mdPreviewActive) updateMdPreview();
      if (htmlPreviewActive) updateHtmlPreview();

      requestAnimationFrame(() => {
        recomputeMetrics();
        ensureCaretVisible();
      });
    }

    async function saveToUrlDebounced() {
      if (isApplyingFromHash) return;
      if (saveTimer) clearTimeout(saveTimer);

      saveTimer = setTimeout(async () => {
        const text = $text.value;
        const langId = persistLangId();
        const payload = await encodeToHashPayload(text, langId);
        const newHash = "#" + payload;
        if (location.hash !== newHash) history.replaceState(null, "", newHash);
      }, 250);
    }

    async function applyFromUrlHash() {
      const hash = (location.hash || "").replace(/^#/, "");
      const { text, langId, wrap } = await decodeFromHashPayload(hash);

      isApplyingFromHash = true;
      try {
        $text.value = text || "";
        wrapEnabled = !!wrap;

        try { $text.setSelectionRange(0, 0); } catch (e) {}

        if (langId === "auto") {
          autoEnabled = true;
          lockedLang = "plaintext";
        } else {
          autoEnabled = false;
          lockedLang = langId;
          ensureLangOption(lockedLang);
        }

        render();

        requestAnimationFrame(() => {
          forceScrollTopLeft();
          try { $text.setSelectionRange(0, 0); } catch (e) {}
        });
      } finally {
        isApplyingFromHash = false;
      }
    }

    function toggleWrap() {
      wrapEnabled = !wrapEnabled;
      forceScrollTopLeft();
      try { $text.setSelectionRange(0, 0); } catch (e) {}
      render();
      saveToUrlDebounced();
    }

    function init() {
      const host = location.hostname ? location.hostname : "local";
      const baseUrl = location.origin + location.pathname;

      $domainLink.textContent = host;
      $domainLink.href = baseUrl;

      for (const l of LANGS) {
        const opt = document.createElement("option");
        opt.value = l.id;
        opt.textContent = l.label;
        $langSelect.appendChild(opt);
      }

      recomputeMetrics();

      $text.addEventListener("input", () => {
        render();
        saveToUrlDebounced();
      });

      $text.addEventListener("keydown", () => requestAnimationFrame(ensureCaretVisible));
      $text.addEventListener("keyup", () => requestAnimationFrame(ensureCaretVisible));
      $text.addEventListener("click", () => requestAnimationFrame(ensureCaretVisible));
      $text.addEventListener("select", () => requestAnimationFrame(ensureCaretVisible));

      $lines.addEventListener("click", toggleWrap);

      $langSelect.addEventListener("change", () => {
        if (suppressLangChange) return;

        const v = $langSelect.value;
        if (v === "auto") {
          autoEnabled = true;
          lockedLang = "plaintext";
        } else {
          autoEnabled = false;
          lockedLang = v;
        }

        render();
        saveToUrlDebounced();
        $text.focus();
      });

      $downloadBtn.addEventListener("click", () => {
        if (mdPreviewActive && isMarkdownActive()) {
          downloadAsHtml();
        } else if (htmlPreviewActive && isHtmlActive()) {
          downloadCurrentText();
        } else {
          downloadCurrentText();
        }
        $text.focus();
      });

      $mdToggleBtn.addEventListener("click", toggleMdPreview);
      $htmlToggleBtn.addEventListener("click", toggleHtmlPreview);

      window.addEventListener("resize", () => {
        recomputeMetrics();
        render();
      });

      window.addEventListener("hashchange", () => {
        applyFromUrlHash();
      });

      applyFromUrlHash().then(() => {
        forceScrollTopLeft();
        if (!$text.value) $text.focus();
      });
    }

    init();
  </script>
